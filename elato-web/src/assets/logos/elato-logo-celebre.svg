<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <style>
    /* CSS animations for Animation 01: The Architectural Reveal */
    .fidelity-frame { opacity: 0; animation: crossfade-in 0.16s linear 7.84s forwards; }
    .animated-scene-wrapper { opacity: 1; animation: crossfade-out 0.16s linear 7.84s forwards; }
    
    @keyframes crossfade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes crossfade-out { 0% { opacity: 1; } 100% { opacity: 0; } }

    .scene {
      transform-origin: 500px 188px;
      transform: scale(0.9) skewX(-20deg) skewY(5deg);
      animation: sceneParallax 4s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
    }
    @keyframes sceneParallax { to { transform: scale(1) skewX(0deg) skewY(0deg); } }

    .depth-2 {
      transform: translate(-15px, 15px);
      opacity: 0.3;
      animation: depthParallax 4s cubic-bezier(0.25, 1, 0.5, 1) 2s forwards;
    }
    @keyframes depthParallax { to { transform: translate(0px, 0px); opacity: 0; } }

    .pulse {
      stroke-dasharray: 20 60;
      opacity: 0;
      animation: pulseAnim 0.8s linear forwards;
    }
    @keyframes pulseAnim {
      0% { stroke-dashoffset: 400; opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    .p-1 { animation-delay: 0.0s; }
    .p-2 { animation-delay: 0.1s; }
    .p-3 { animation-delay: 0.2s; }
    .p-4 { animation-delay: 0.3s; }

    .wireframe {
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      opacity: 0;
    }
    .wf-1 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards; }
    .wf-2 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 1.0s forwards; }
    .wf-3 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 1.2s forwards; }
    .wf-4 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 1.4s forwards; }
    .wf-5 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 1.6s forwards; }
    .wf-6 { animation: drawWf 3.0s cubic-bezier(0.4, 0, 0.2, 1) 1.8s forwards; }

    @keyframes drawWf {
      0% { stroke-dashoffset: 1200; opacity: 1; }
      70% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }

    .mask-sweep {
      animation: sweepMask 1.8s cubic-bezier(0.4, 0, 0.2, 1) 3.2s forwards;
    }
    @keyframes sweepMask {
      0% { width: 10px; }
      100% { width: 1200px; }
    }

    .o-mask-circle {
      animation: bloomO 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 2.8s forwards;
    }
    @keyframes bloomO {
      0% { r: 0; }
      100% { r: 130px; }
    }

    .macron-group {
      opacity: 0;
      transform: translateY(-20px);
      animation: snapMacron 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 2.8s forwards;
    }
    @keyframes snapMacron {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .light-sweep-rect {
      transform: translateX(-300px) skewX(-20deg);
      animation: lightSweep 1.5s cubic-bezier(0.4, 0, 0.2, 1) 6.0s forwards;
    }
    @keyframes lightSweep {
      0% { transform: translateX(-300px) skewX(-20deg); }
      100% { transform: translateX(900px) skewX(-20deg); }
    }
  </style>

  <defs>
    <!-- Primary ELATŌ Logomark -->
    <path id="path-E" d="M 270 160 H 330 V 178 H 290 V 191.5 H 320 V 208.5 H 290 V 222 H 330 V 240 H 270 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-L" d="M 355 160 H 375 V 222 H 410 V 240 H 355 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-A" d="M 469 160 H 491 L 530 240 H 508 L 499.71 223 H 460.29 L 452 240 H 430 Z M 480 182.56 L 467.6 208 H 492.4 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-T" d="M 550 160 H 620 V 178 H 595 V 240 H 575 V 178 H 550 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-O" d="M 687,158 C 710.2,158 729,176.8 729,200 C 729,223.2 710.2,242 687,242 C 663.8,242 645,223.2 645,200 C 645,176.8 663.8,158 687,158 Z M 687,178 C 674.8,178 665,187.8 665,200 C 665,212.2 674.8,222 687,222 C 699.2,222 709,212.2 709,200 C 709,187.8 699.2,178 687,178 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-macron" d="M 665 140 H 709 V 150 H 665 Z" fill-rule="evenodd" clip-rule="evenodd" />

    <!-- Subtitle CELEBRÉ (True Montserrat Paths) -->
    <path id="path-C2" d="M280.83 300.34Q278.51 300.34 276.53 299.57Q274.54 298.80 273.09 297.41Q271.63 296.03 270.81 294.14Q270 292.26 270 290Q270 287.74 270.81 285.86Q271.63 283.97 273.10 282.59Q274.57 281.20 276.54 280.43Q278.51 279.66 280.86 279.66Q283.46 279.66 285.57 280.57Q287.69 281.49 289.09 283.20L286.11 285.94Q284.06 283.60 281.09 283.60Q279.20 283.60 277.76 284.41Q276.31 285.23 275.50 286.67Q274.69 288.11 274.69 290Q274.69 291.89 275.50 293.33Q276.31 294.77 277.76 295.59Q279.20 296.40 281.09 296.40Q284.06 296.40 286.11 294.03L289.09 296.77Q287.69 298.51 285.57 299.43Q283.46 300.34 280.83 300.34" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-E2" d="M361.70 300L346.21 300L346.21 280L361.32 280L361.32 283.71L350.81 283.71L350.81 288.06L360.10 288.06L360.10 291.66L350.81 291.66L350.81 296.29L361.70 296.29" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-L2" d="M433.48 300L418.82 300L418.82 280L423.45 280L423.45 296.23L433.48 296.23" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-E3" d="M506.09 300L490.60 300L490.60 280L505.71 280L505.71 283.71L495.20 283.71L495.20 288.06L504.49 288.06L504.49 291.66L495.20 291.66L495.20 296.29L506.09 296.29" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-B2" d="M573.55 300L563.21 300L563.21 280L572.98 280Q576.75 280 578.65 281.43Q580.55 282.86 580.55 285.20Q580.55 286.71 579.85 287.83Q579.15 288.94 577.92 289.60Q579.58 290.14 580.57 291.40Q581.55 292.66 581.55 294.54Q581.55 297.11 579.52 298.56Q577.50 300 573.55 300M567.81 291.57L567.81 296.51L573.21 296.51Q575.01 296.51 575.95 295.93Q576.90 295.34 576.90 294.06Q576.90 291.57 573.21 291.57L567.81 291.57M567.81 283.49L567.81 288.20L572.41 288.20Q575.90 288.20 575.90 285.83Q575.90 283.49 572.41 283.49" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-R2" d="M643.30 300L638.68 300L638.68 280L647.22 280Q651.39 280 653.70 281.94Q656.02 283.89 656.02 287.26Q656.02 289.49 654.95 291.10Q653.88 292.71 651.93 293.57L656.39 300L651.42 300L647.56 294.43Q647.45 294.43 647.33 294.43L643.30 294.43L643.30 300M643.30 283.77L643.30 290.74L647.08 290.74Q649.19 290.74 650.26 289.81Q651.33 288.89 651.33 287.26Q651.33 285.60 650.26 284.69Q649.19 283.77 647.08 283.77" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-E4" d="M729 300L713.51 300L713.51 280L728.63 280L728.63 283.71L718.11 283.71L718.11 288.06L727.40 288.06L727.40 291.66L718.11 291.66L718.11 296.29L729 296.29L729 300M721.94 278.37L718.46 278.37L722.31 274.26L727.11 274.26" fill-rule="evenodd" clip-rule="evenodd" />

    <mask id="material-mask">
      <rect class="mask-sweep" x="100" y="0" width="10" height="400" fill="white" transform="skewX(-20)" />
    </mask>
    
    <mask id="o-mask">
      <circle class="o-mask-circle" cx="687" cy="200" r="0" fill="white" />
    </mask>

    <mask id="logo-mask">
      <use href="#path-E" fill="white" />
      <use href="#path-L" fill="white" />
      <use href="#path-A" fill="white" />
      <use href="#path-T" fill="white" />
      <use href="#path-O" fill="white" />
      <use href="#path-macron" fill="white" />
      <use href="#path-C2" fill="white" />
      <use href="#path-E2" fill="white" />
      <use href="#path-L2" fill="white" />
      <use href="#path-E3" fill="white" />
      <use href="#path-B2" fill="white" />
      <use href="#path-R2" fill="white" />
      <use href="#path-E4" fill="white" />
    </mask>

    <linearGradient id="sweep-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.8" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Static Fidelity Frame -->
  <g class="fidelity-frame">
    <use href="#path-E" fill="#A47B22" />
    <use href="#path-L" fill="#A47B22" />
    <use href="#path-A" fill="#A47B22" />
    <use href="#path-T" fill="#A47B22" />
    <use href="#path-O" fill="#A47B22" />
    <use href="#path-macron" fill="#BAA07D" />
    <!-- Celebre text -->
    <use href="#path-C2" fill="#A47B22" />
    <use href="#path-E2" fill="#A47B22" />
    <use href="#path-L2" fill="#A47B22" />
    <use href="#path-E3" fill="#A47B22" />
    <use href="#path-B2" fill="#A47B22" />
    <use href="#path-R2" fill="#A47B22" />
    <use href="#path-E4" fill="#A47B22" />
  </g>

  <!-- Animated Scene -->
  <g class="animated-scene-wrapper">
    <g class="scene">
      <g class="energy-pulses">
        <use href="#path-E" class="pulse p-1" stroke="#fff" stroke-width="2" fill="none" />
        <use href="#path-L" class="pulse p-2" stroke="#fff" stroke-width="2" fill="none" />
        <use href="#path-A" class="pulse p-3" stroke="#fff" stroke-width="2" fill="none" />
        <use href="#path-T" class="pulse p-4" stroke="#fff" stroke-width="2" fill="none" />
        
        <!-- CELEBRÉ pulses -->
        <use href="#path-C2" class="pulse p-1" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-E2" class="pulse p-2" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-L2" class="pulse p-3" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-E3" class="pulse p-4" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-B2" class="pulse p-1" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-R2" class="pulse p-2" stroke="#fff" stroke-width="1.5" fill="none" />
        <use href="#path-E4" class="pulse p-3" stroke="#fff" stroke-width="1.5" fill="none" />
      </g>

      <g class="wireframes depth-2">
        <use href="#path-E" class="wireframe wf-1" stroke="#BAA07D" stroke-width="1" fill="none" />
        <use href="#path-L" class="wireframe wf-2" stroke="#BAA07D" stroke-width="1" fill="none" />
        <use href="#path-A" class="wireframe wf-3" stroke="#BAA07D" stroke-width="1" fill="none" />
        <use href="#path-T" class="wireframe wf-4" stroke="#BAA07D" stroke-width="1" fill="none" />
        <use href="#path-O" class="wireframe wf-5" stroke="#BAA07D" stroke-width="1" fill="none" />
        <use href="#path-macron" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        
        <use href="#path-C2" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-E2" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-L2" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-E3" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-B2" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-R2" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
        <use href="#path-E4" class="wireframe wf-6" stroke="#BAA07D" stroke-width="0.8" fill="none" />
      </g>
      <g class="wireframes depth-1">
        <use href="#path-E" class="wireframe wf-1" stroke="#A47B22" stroke-width="1.5" fill="none" />
        <use href="#path-L" class="wireframe wf-2" stroke="#A47B22" stroke-width="1.5" fill="none" />
        <use href="#path-A" class="wireframe wf-3" stroke="#A47B22" stroke-width="1.5" fill="none" />
        <use href="#path-T" class="wireframe wf-4" stroke="#A47B22" stroke-width="1.5" fill="none" />
        <use href="#path-O" class="wireframe wf-5" stroke="#A47B22" stroke-width="1.5" fill="none" />
        <use href="#path-macron" class="wireframe wf-6" stroke="#BAA07D" stroke-width="1.5" fill="none" />
        
        <use href="#path-C2" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-E2" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-L2" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-E3" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-B2" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-R2" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
        <use href="#path-E4" class="wireframe wf-6" stroke="#A47B22" stroke-width="1" fill="none" />
      </g>

      <g mask="url(#material-mask)">
        <use href="#path-E" fill="#A47B22" />
        <use href="#path-L" fill="#A47B22" />
        <use href="#path-A" fill="#A47B22" />
        <use href="#path-T" fill="#A47B22" />
        
        <use href="#path-C2" fill="#A47B22" />
        <use href="#path-E2" fill="#A47B22" />
        <use href="#path-L2" fill="#A47B22" />
        <use href="#path-E3" fill="#A47B22" />
        <use href="#path-B2" fill="#A47B22" />
        <use href="#path-R2" fill="#A47B22" />
        <use href="#path-E4" fill="#A47B22" />
      </g>

      <g mask="url(#o-mask)" class="signature-group">
        <use href="#path-O" fill="#A47B22" />
      </g>
      <g class="macron-group">
        <use href="#path-macron" fill="#BAA07D" />
      </g>
    </g>

    <rect class="light-sweep-rect" x="100" y="0" width="300" height="400" fill="url(#sweep-grad)" transform="skewX(-20)" mask="url(#logo-mask)" />
  </g>
</svg>
