<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <!-- Transparent Background -->
  <style>
    /* Absolute Fidelity Guarantee */
    .fidelity-frame { opacity: 0; animation: crossfade-in 0.08s linear 3.92s forwards; }
    .animated-scene-wrapper { opacity: 1; animation: crossfade-out 0.08s linear 3.92s forwards; }
    
    @keyframes crossfade-in { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes crossfade-out { 0% { opacity: 1; } 100% { opacity: 0; } }

    /* The Majestic Scale (Cinematic Presence) */
    .majestic-scale {
      transform-origin: 500px 200px;
      animation: cinematicScale 4.0s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes cinematicScale {
      0% { transform: scale(1.05); }
      100% { transform: scale(1.00); }
    }

    /* Glowing Calligraphy Lines */
    .gold-stroke {
      stroke: #6D4C13; /* Lighter, highly reflective gold */
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      opacity: 0;
      animation: drawCalligraphy 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .s-1 { animation-delay: 0.0s; }
    .s-2 { animation-delay: 0.1s; }
    .s-3 { animation-delay: 0.2s; }
    .s-4 { animation-delay: 0.3s; }
    .s-5 { animation-delay: 0.4s; }

    @keyframes drawCalligraphy {
      0% { stroke-dashoffset: 1200; opacity: 0; }
      10% { opacity: 1; }
      80% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }

    /* Solid Fill Bloom */
    .solid-fill {
      opacity: 0;
      transform: scale(0.95);
      animation: bloomFill 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    .f-1 { animation-delay: 0.9s; }
    .f-2 { animation-delay: 1.0s; }
    .f-3 { animation-delay: 1.1s; }
    .f-4 { animation-delay: 1.2s; }
    .f-5 { animation-delay: 1.3s; }

    @keyframes bloomFill {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Sharp Polished Specular Shimmer */
    .specular-sweep {
      transform: translateX(-300px) skewX(-30deg);
      opacity: 0;
      animation: sweepLight 1.5s cubic-bezier(0.4, 0, 0.2, 1) 1.6s forwards;
    }
    @keyframes sweepLight {
      0% { transform: translateX(-300px) skewX(-30deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(1100px) skewX(-30deg); opacity: 0; }
    }

    /* Macron Drops in Liquid Smoothly */
    .macron-drop {
      opacity: 0;
      transform: translateY(-20px);
      animation: dropIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s forwards;
    }
    @keyframes dropIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0px); }
    }
  </style>

  <defs>
    <!-- True Luxury Bloom Filter -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#6D4C13" flood-opacity="0.25" />
    </filter>

    <linearGradient id="specular-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="40%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="1" />
      <stop offset="60%" stop-color="white" stop-opacity="0" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <!-- Primary ELATŌ Logomark (Exact Original Paths) -->
    <path id="path-E" d="M 270 160 H 330 V 178 H 290 V 191.5 H 320 V 208.5 H 290 V 222 H 330 V 240 H 270 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-L" d="M 355 160 H 375 V 222 H 410 V 240 H 355 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-A" d="M 469 160 H 491 L 530 240 H 508 L 499.71 223 H 460.29 L 452 240 H 430 Z M 480 182.56 L 467.6 208 H 492.4 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-T" d="M 550 160 H 620 V 178 H 595 V 240 H 575 V 178 H 550 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-O" d="M 687,158 C 710.2,158 729,176.8 729,200 C 729,223.2 710.2,242 687,242 C 663.8,242 645,223.2 645,200 C 645,176.8 663.8,158 687,158 Z M 687,178 C 674.8,178 665,187.8 665,200 C 665,212.2 674.8,222 687,222 C 699.2,222 709,212.2 709,200 C 709,187.8 699.2,178 687,178 Z" fill-rule="evenodd" clip-rule="evenodd" />
    <path id="path-macron" d="M 665 140 H 709 V 150 H 665 Z" fill-rule="evenodd" clip-rule="evenodd" />

    <mask id="logo-mask">
      <use href="#path-E" fill="white" />
      <use href="#path-L" fill="white" />
      <use href="#path-A" fill="white" />
      <use href="#path-T" fill="white" />
      <use href="#path-O" fill="white" />
      <use href="#path-macron" fill="white" />
    </mask>
  </defs>

  <!-- Static Fidelity Frame (Guarantees permanent flawless state after 4s) -->
  <g class="fidelity-frame">
    <use href="#path-E" fill="#A47B22" />
    <use href="#path-L" fill="#A47B22" />
    <use href="#path-A" fill="#A47B22" />
    <use href="#path-T" fill="#A47B22" />
    <use href="#path-O" fill="#A47B22" />
    <use href="#path-macron" fill="#BAA07D" />
  </g>

  <!-- Animated Scene -->
  <g class="animated-scene-wrapper majestic-scale">
    
    <!-- Solid Fills (Bloom in) -->
    <use href="#path-E" class="solid-fill f-1" fill="#A47B22" style="transform-origin: 300px 200px;" />
    <use href="#path-L" class="solid-fill f-2" fill="#A47B22" style="transform-origin: 382px 200px;" />
    <use href="#path-A" class="solid-fill f-3" fill="#A47B22" style="transform-origin: 480px 200px;" />
    <use href="#path-T" class="solid-fill f-4" fill="#A47B22" style="transform-origin: 585px 200px;" />
    <use href="#path-O" class="solid-fill f-5" fill="#A47B22" style="transform-origin: 687px 200px;" />
    
    <!-- Macron Drop -->
    <use href="#path-macron" class="macron-drop" fill="#BAA07D" />

    <!-- Glowing Calligraphy Strokes (Draw over the top) -->
    <g filter="url(#gold-glow)">
      <use href="#path-E" class="gold-stroke s-1" />
      <use href="#path-L" class="gold-stroke s-2" />
      <use href="#path-A" class="gold-stroke s-3" />
      <use href="#path-T" class="gold-stroke s-4" />
      <use href="#path-O" class="gold-stroke s-5" />
    </g>

    <!-- Specular Shimmer Layer -->
    <rect class="specular-sweep" x="0" y="0" width="400" height="400" fill="url(#specular-grad)" mask="url(#logo-mask)" />
  </g>
</svg>
