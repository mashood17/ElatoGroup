name: CI

# Runs on every PR and every push to main. This is the workflow a
# required-status-check branch protection rule on `main` should point at —
# no deploy jobs live here; Vercel (elato-web, elato-admin) and Render
# (elato-backend) deploy on push to main independently, outside GitHub
# Actions (see Section 12 of the project spec / each app's README).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  web:
    name: elato-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elato-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: elato-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build

  admin:
    name: elato-admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elato-admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: elato-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build

  backend:
    name: elato-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elato-backend
    env:
      # Dummy values so app.core.config.Settings() validates at import time
      # without a real Supabase project — no test here talks to Supabase for
      # real (see tests/conftest.py for the full rationale).
      ENV: test
      JWT_SECRET: ci-only-secret-not-for-production
      SUPABASE_URL: https://ci-placeholder.supabase.co
      SUPABASE_SECRET_KEY: ci-only-placeholder-key
      SYNC_CRON_SECRET: ci-only-cron-secret
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: elato-backend/requirements-dev.txt

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Import sanity check
        run: |
          . .venv/bin/activate
          python -c "from app.main import app"

      - name: Run tests (pytest)
        run: |
          . .venv/bin/activate
          pytest -v

  e2e:
    name: elato-web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: web
    # Soft-fail: this suite mocks every elato-backend API call at the network
    # layer (see elato-web/e2e/fixtures/api-mocks.ts) so it doesn't actually
    # depend on live backend/Supabase state — but Playwright/browser install
    # and CI-environment flakiness (network access for wa.me interception,
    # download mirrors, etc.) is still a real risk class this project hasn't
    # had a chance to harden against yet. Keeping it non-blocking for now so
    # a flaky E2E run can't block an otherwise-safe merge; tighten this to a
    # hard requirement once the suite has a track record in CI.
    continue-on-error: true
    defaults:
      run:
        working-directory: elato-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: elato-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: elato-web/playwright-report/
          retention-days: 14

  lighthouse:
    name: elato-web Lighthouse CI
    runs-on: ubuntu-latest
    needs: web
    continue-on-error: true
    defaults:
      run:
        working-directory: elato-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: elato-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.15.x autorun
