name: Instagram Reels Sync

# Scheduled trigger for POST /api/v1/sync/instagram (see
# elato-backend/app/api/v1/sync.py) — the endpoint itself already exists
# and does the real work (Graph API fetch, media download/upload, DB
# upsert); this workflow is just the "hit it on a timer" piece, since
# nothing else in the repo calls it automatically.
#
# Requires two repository secrets (Settings > Secrets and variables >
# Actions), neither of which exists yet — the workflow no-ops with a clear
# error until both are set:
#   BACKEND_SYNC_URL     e.g. https://elato-backend.onrender.com/api/v1/sync/instagram
#   SYNC_CRON_SECRET      same value as the backend's SYNC_CRON_SECRET env var

on:
  schedule:
    # Every 30 minutes. GitHub Actions cron can lag by several minutes
    # under load — treat this as "at least every ~30-45 min", not exact.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    name: Trigger Instagram sync
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          if [ -z "${{ secrets.BACKEND_SYNC_URL }}" ] || [ -z "${{ secrets.SYNC_CRON_SECRET }}" ]; then
            echo "::error::BACKEND_SYNC_URL and/or SYNC_CRON_SECRET repository secrets are not set — see this workflow's header comment."
            exit 1
          fi
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            -H "X-Cron-Secret: ${{ secrets.SYNC_CRON_SECRET }}" \
            "${{ secrets.BACKEND_SYNC_URL }}")
          echo "Response: $(cat /tmp/response.json)"
          if [ "$status" -ge 300 ]; then
            echo "::error::Instagram sync request failed with HTTP $status"
            exit 1
          fi
