services:
  - type: web
    name: elato-backend
    runtime: python
    plan: starter
    region: singapore
    branch: main
    rootDir: elato-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Explicit Python version — matches the interpreter this backend was
      # developed and CI-tested against (see .github/workflows/ci.yml).
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENV
        value: production
      # Everything below must be set for real in the Render dashboard
      # (Environment tab) — intentionally left with `sync: false` so
      # `render.yaml` never carries real secrets and a blueprint sync can't
      # silently blank them out. See elato-backend/.env.example for what
      # each one is for.
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: WHATSAPP_BUSINESS_NUMBER
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_ADMIN_URL
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: GOOGLE_PLACE_ID
        sync: false
      - key: INSTAGRAM_GRAPH_TOKEN
        sync: false
      - key: INSTAGRAM_BUSINESS_ID
        sync: false
      # Scheduled sync (POST /api/v1/sync/instagram) is triggered by the
      # .github/workflows/instagram-sync.yml GitHub Actions cron, not a
      # Render Cron Job — this value must match the SYNC_CRON_SECRET repo
      # secret configured there.
      - key: SYNC_CRON_SECRET
        sync: false
